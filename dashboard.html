
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
}

.navbar {
    background: #111827;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    width: 70%;
    margin: 50px auto;
}

h2{
    text-align: center;
    margin-bottom: 40px;
}

.button-section{
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-buttons{
    display: flex;
    gap: 20px;
}

.btn {
    display: inline-block;
    padding: 12px 20px;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 18px;
}

.btn:hover{
    background: #1d4ed8;
}
</style>

</head>

<body>

<div class="navbar">Job Portal Dashboard</div>

<div class="container">

    <h2>Welcome To Job Application Portal</h2>

    <div class="button-section">

        <!-- Left Side -->
        <div class="left-buttons">
            <a href="/viewJobs" class="btn">View Jobs</a>
            <a href="/add-job.html" id ="addJobBtn"class="btn">Add Job</a>
        </div>

        <!-- Right Side -->
        <a href="/login.html" class="btn">Logout</a>
		

    </div>

</div>


<script>

let role = localStorage.getItem("role");

console.log("ROLE =", role);

if(role !== "ADMIN"){

    document.getElementById("addJobBtn").style.display = "none";

}

</script>
</body>
</html>
