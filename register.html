<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #10b981, #065f46);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #10b981;
    color: white;
    border: none;
}
</style>

</head>

<body>

<div class="card">
    <h2>Register</h2>

    <form action="/register" method="post">
        <input type="text" name="name" placeholder="Name"><br>
        <input type="email" name="email" placeholder="Email"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button>Register</button>
    </form>

    <p>Already have account? <a href="/login.html">Login</a></p>
</div>

</body>
</html>
